name: TwinBuddy CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: twinbuddy
          POSTGRES_USER: twinbuddy
          POSTGRES_PASSWORD: twinbuddy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U twinbuddy -d twinbuddy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://twinbuddy:twinbuddy@localhost:5432/twinbuddy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install backend deps
        run: pip install -r api/requirements.txt
      - name: Run migrations
        run: alembic -c api/alembic.ini upgrade head
      - name: Run backend tests
        run: pytest api/tests -q

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twinbuddy/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: twinbuddy/frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Run vitest
        run: npm run test -- --run
      - name: Build frontend
        run: npm run build
