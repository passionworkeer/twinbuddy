<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md">

</div>

<button class="text-left border-2 border-primary rounded-lg p-container-padding bg-primary text-on-primary brutalist-card-active transition-all relative overflow-hidden group">
<div class="relative z-10">

<span class="font-body-lg text-body-lg font-bold block mb-4">外向</span>

</div>
<span class="material-symbols-outlined absolute -bottom-4 -right-4 text-[120px] opacity-5 text-primary transition-all group-hover:opacity-10 group-hover:scale-110 font-bold" data-icon="self_improvement">self_improvement</span>
</button>
</div>
</div>
