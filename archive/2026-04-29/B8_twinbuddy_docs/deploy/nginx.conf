# TwinBuddy v3 — Nginx 生产配置（含 HTTPS）
# 复制到: /etc/nginx/sites-available/twinbuddy
# 启用:   ln -sf /etc/nginx/sites-available/twinbuddy /etc/nginx/sites-enabled/
# 测试:   nginx -t
# 重载:   systemctl reload nginx

# ──────────────────────────────────────────────────────
# HTTP → HTTPS 重定向（HTTP 站点）
# ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name twinbuddy.xyz www.twinbuddy.xyz;

    # 301 重定向到 HTTPS
    return 301 https://$host$request_uri;
}

# ──────────────────────────────────────────────────────
# HTTPS 站点（SSL 证书来自阿里云 CAS）
# 证书文件上传到服务器后，修改下面两行路径：
#   ssl_certificate     /etc/nginx/ssl/twinbuddy.pem;
#   ssl_certificate_key /etc/nginx/ssl/twinbuddy.key;
# ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name twinbuddy.xyz www.twinbuddy.xyz;

    # ── SSL 证书（修改为你服务器上实际存放路径）─────────
    ssl_certificate     /etc/nginx/ssl/twinbuddy.pem;
    ssl_certificate_key /etc/nginx/ssl/twinbuddy.key;

    # ── SSL 安全配置 ───────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS（可选，首次配置建议注释掉，确认 HTTPS 正常后再开启）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── 前端静态文件 ────────────────────────────────────
    root /opt/twinbuddy/frontend/dist;
    index index.html;

    # 启用 gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml image/svg+xml font/woff font/woff2;
    gzip_min_length 512;

    # React Router SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API 反向代理 ────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置（LLM 调用可能较慢）
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 健康检查直达后端
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    # ── 静态资源缓存 ────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── 安全头 ─────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── 日志 ────────────────────────────────────────────
    access_log /var/log/nginx/twinbuddy_access.log;
    error_log  /var/log/nginx/twinbuddy_error.log;
}
