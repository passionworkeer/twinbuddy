version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: twinbuddy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: twinbuddy
      POSTGRES_USER: twinbuddy
      POSTGRES_PASSWORD: twinbuddy
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: twinbuddy-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: twinbuddy-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
