# TwinBuddy v3 — Nginx 生产配置
# 复制到: /etc/nginx/sites-available/twinbuddy
# 启用:   ln -sf /etc/nginx/sites-available/twinbuddy /etc/nginx/sites-enabled/
# 测试:   nginx -t
# 重载:   systemctl reload nginx

server {
    listen 80;
    server_name _;   # 接受任意域名/IP

    # ── 前端静态文件 ───────────────────────────────
    root /opt/twinbuddy/frontend/dist;
    index index.html;

    # 启用 gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml image/svg+xml font/woff font/woff2;
    gzip_min_length 512;

    # React Router SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API 反向代理 ───────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置（LLM 调用可能较慢）
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 健康检查直达后端
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    # ── 静态资源缓存 ──────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── 安全头 ────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── 日志 ──────────────────────────────────────
    access_log /var/log/nginx/twinbuddy_access.log;
    error_log  /var/log/nginx/twinbuddy_error.log;
}
