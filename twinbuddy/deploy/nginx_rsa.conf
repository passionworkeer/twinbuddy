# ==================== HTTP → HTTPS 强制跳转 ====================
server {
    listen 80;
    server_name twinbuddy.xyz www.twinbuddy.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ==================== HTTPS 主配置（RSA证书 + 移动端兼容）====================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name twinbuddy.xyz www.twinbuddy.xyz;

    # RSA 证书（新申请，兼容微信/百度浏览器）
    ssl_certificate /etc/letsencrypt/live/twinbuddy.xyz-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/twinbuddy.xyz-0001/privkey.pem;

    # 移动端友好 cipher（RSA在前，TLS 1.2必须保留）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=63072000" always;

    root /home/admin/twinbuddy/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /videos/ {
        alias /home/admin/twinbuddy/frontend/public/videos/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /images/ {
        alias /home/admin/twinbuddy/frontend/public/images/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}
